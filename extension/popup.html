<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frameful Auto Zoom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fafafa;
    }

    .header-text p {
      font-size: 11px;
      color: #71717a;
      margin-top: 1px;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #a1a1aa;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3f3f46;
    }

    .dot.active {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .count {
      font-size: 12px;
      color: #a855f7;
      font-weight: 600;
    }

    .hint {
      font-size: 11px;
      color: #52525b;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>Frameful Auto Zoom</h1>
      <p>Click capture companion</p>
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <span class="status-indicator">
        <span class="dot" id="dot"></span>
        <span id="status-text">Idle</span>
      </span>
      <span class="count" id="count" style="display:none"></span>
    </div>

    <p class="hint" id="hint">
      Start a recording in Frameful to begin capturing clicks.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>

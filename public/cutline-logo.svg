<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle with playful stroke -->
  <circle cx="60" cy="60" r="54" fill="url(#bgGradient)" stroke="#1e1b4b" stroke-width="5" />
  
  <!-- Camera Body: a squircle-like rounded rect -->
  <rect x="28" y="38" width="44" height="44" rx="14" fill="#7dd3fc" stroke="#1e1b4b" stroke-width="5" stroke-linejoin="round" />
  
  <!-- Camera Lens -->
  <circle cx="42" cy="60" r="6" fill="#1e1b4b" />
  
  <!-- Camera Lens Cone / Flange -->
  <path d="M 72 48 L 92 37 C 96 35, 99 37, 98 41 L 95 60 L 98 79 C 99 83, 96 85, 92 83 L 72 72" fill="#7dd3fc" stroke="#1e1b4b" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
